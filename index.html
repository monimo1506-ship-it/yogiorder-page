
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>요기오더 - 포스기 단품 계약 3년 전액지원</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    }

    /* ── 각 페이지 섹션 ── */
    .page {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #111;
    }

    .page img {
      width: 100%;
      max-width: 600px;
      height: auto;
      display: block;
    }

    /* ── 문의하기 버튼 영역 ── */
    .button-section {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 36px 24px 48px;
      background: #0f0f1e;
      gap: 14px;
    }

    .btn-desc {
      font-size: 14px;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.3px;
    }

    .inquiry-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      max-width: 600px;
      padding: 20px 0;
      background: linear-gradient(135deg, #e8401c 0%, #c0392b 100%);
      color: #ffffff;
      font-size: 20px;
      font-weight: 700;
      text-decoration: none;
      border-radius: 16px;
      letter-spacing: 1px;
      box-shadow: 0 6px 24px rgba(232,64,28,0.45);
      transition: transform 0.18s, box-shadow 0.18s;
      position: relative;
      overflow: hidden;
    }

    .inquiry-btn::after {
      content: '';
      position: absolute;
      top: 0; left: -75%;
      width: 50%;
      height: 100%;
      background: linear-gradient(120deg, transparent 0%, rgba(255,255,255,0.2) 50%, transparent 100%);
      transform: skewX(-20deg);
      animation: shimmer 2.8s infinite;
    }

    @keyframes shimmer {
      0%   { left: -75%; }
      60%  { left: 125%; }
      100% { left: 125%; }
    }

    .inquiry-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 14px 32px rgba(232,64,28,0.55);
    }

    .inquiry-btn:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>

  <!-- ── 1페이지 이미지 ── -->
  <div class="page">
    <img src="1면.JPG" alt="포스기 단품만 계약해도 3년동안 전액지원 페이지1" />
  </div>

  <!-- ── 2페이지 이미지 ── -->
  <div class="page">
    <img src="2면.JPG" alt="요기오더 상세 안내 페이지2" />
  </div>

  <!-- ── 문의하기 버튼 ── -->
  <div class="button-section">
    <p class="btn-desc">지금 바로 상담 신청하고 혜택을 받아보세요!</p>
    <a
      href="https://yogiorder.co.kr/sub/smallbiz.php"
      target="_blank"
      rel="noopener noreferrer"
      class="inquiry-btn"
    >
      📞 문의하기 →
    </a>
  </div>

</body>
</html>
